processes:
  - id: xtf_validator
    implementation: Geopilot.Api.Pipeline.Process.XtfValidation.XtfValidatorProcess
  - id: zip_package_process
    implementation: Geopilot.Api.Pipeline.Process.ZipPackage.ZipPackageProcess
  - id: xtf_matcher
    implementation: Geopilot.Api.Pipeline.Process.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions: xtf
      iliModels: null
      fileNamePatterns: null
pipelines:
  - id: two_steps
    display_name:
      en: two steps pipeline
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
        process_id: xtf_matcher
        output:
          - take: xtf_files
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          - from: xtf_matching
            take: xtf_files
            as: iliFile
        output:
          - take: error_log
            as: error_log
            action:
          - take: xtf_log
            as: xtf_log
            action:
              - DOWNLOAD
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        input:
          - from: validation
            take: invalid_reference
            as: input
          - from: validation
            take: xtf_log
            as: input
        output:
          - take: zip_package
            as: zip_package
            action:
              - DOWNLOAD
