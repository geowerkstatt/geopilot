processes:
  - id: xtf_validator
    implementation: Geopilot.Api.Pipeline.Process.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: DEFAULT
      pollInterval: 500
  - id: zip_package_process
    implementation: Geopilot.Api.Pipeline.Process.ZipPackage.ZipPackageProcess
    default_config:
      archiveFileName: myPersonalZipArchive
  - id: xtf_matcher
    implementation: Geopilot.Api.Pipeline.Process.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels:
pipelines:
  - id: two_steps_roadsexdm2ien
    display_name:
      en: two steps pipeline
    delivery_condition: "[validation.successful]"
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        process_config_overwrites:
          iliModels:
            - RoadsExdm2ien
        output:
          - take: xtf_files
            as: xtfFiles
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          - from: matcher
            take: xtfFiles
            as: iliFile
        output:
          - take: error_log
            as: errorlog
            action:
          - take: xtf_log
            as: xtflog
            action:
              - DOWNLOAD
          - take: validation_successful
            as: successful
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        process_config_overwrites:
        conditions:
          pre:
            skip_condition: "[validation.errorlog] == null && [validation.xtflog] == null"
            fail_condition: "[validation.errorlog] == null && [validation.xtflog] == null"
          post:
            fail_condition: "[zip_package.archive] == null"
        input:
          - from: validation
            take: errorlog
            as: input
          - from: validation
            take: xtflog
            as: input
          - from: matcher
            take: xtfFiles
            as: input
        output:
          - take: zip_package
            as: archive
            action:
              - DOWNLOAD
