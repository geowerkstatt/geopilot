processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
pipelines:
  - display_name:
      en: XTF Validation
    steps:
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${step_output(upload.ili_file)}"
        output:
          - take: ErrorLog
            as: error_log
            action:
          - take: XtfLog
            as: xtf_log
            action:
              - DOWNLOAD
