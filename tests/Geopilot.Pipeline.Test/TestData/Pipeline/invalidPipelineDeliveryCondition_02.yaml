processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      log_level: INFO
      profile: null
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
    delivery_restrictions:
      - expression: "([upload.ili_file]"
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
        process_id: xtf_matcher
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${step_output(xtf_matching.xtf_files)}"
