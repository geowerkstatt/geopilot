processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      log_level: INFO
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation 1
    steps:
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
        output:
          - take: ErrorLog
            as: error_log
            action:
          - take: XtfLog
            as: xtf_log
            action:
              - DOWNLOAD
