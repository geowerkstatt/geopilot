processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
  - id: zip_package_process
    implementation: Geopilot.Pipeline.Processes.ZipPackage.ZipPackageProcess
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
pipelines:
  - id: two_steps
    display_name:
      en: two steps pipeline
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
        process_id: xtf_matcher
        output:
          - take: xtf_files
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${step_output(xtf_matching.xtf_files)}"
        output:
          - take: error_log
            as: error_log
            action:
          - take: xtf_log
            as: xtf_log
            action:
              - DOWNLOAD
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        input:
          input:
            - "${step_output(validation.xtf_log)}"
            - "${step_output(validation.invalid_reference)}"
        output:
          - take: zip_package
            as: zip_package
            action:
              - DOWNLOAD
