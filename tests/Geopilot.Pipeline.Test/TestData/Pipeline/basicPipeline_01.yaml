processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: DEFAULT
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels:
        - RoadsExdm2ien
      fileNamePatterns:
        - .*
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
        process_id: xtf_matcher
        input:
          files: "${upload()}"
        output:
          - take: xtf_files
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        process_config_overwrites:
          validationProfile: PROFILE-A
        input:
          iliFile: "${step_output(xtf_matching.xtf_files)}"
        output:
          - take: error_log
            as: error_log
            action:
          - take: xtf_log
            as: xtf_log
            action:
              - DOWNLOAD
