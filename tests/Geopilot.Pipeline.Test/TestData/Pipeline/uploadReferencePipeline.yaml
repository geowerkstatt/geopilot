processes:
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels:
        - RoadsExdm2ien
pipelines:
  - id: upload_reference
    display_name:
      en: upload reference pipeline
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        input:
          files: "${upload()}"
        output:
          - take: XtfFiles
            as: xtf_files
