processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
  - id: zip_package_process
    implementation: Geopilot.Pipeline.Processes.ZipPackage.ZipPackageProcess
    default_config:
pipelines:
  - id: two_steps
    display_name:
      en: two steps pipeline
    steps:
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        process_config_overwrites:
        input:
          iliFile: "${step_output(zip.zip_package)}"
        output:
          - take: ErrorLog
            as: error_log
            action:
          - take: XtfLog
            as: xtf_log
            action:
              - DOWNLOAD
      - id: zip
        display_name:
          en: ZIP Package Step
        process_id: zip_package_process
        process_config_overwrites:
        input:
        output:
          - take: ZipPackage
            as: input
            action:
