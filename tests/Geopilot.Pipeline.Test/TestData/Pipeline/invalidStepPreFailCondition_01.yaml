processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      log_level: INFO
      profile: null
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
        process_id: xtf_matcher
        output:
          - take: XtfFiles
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "[upload.foo] != null"
        input:
          iliFile: "${step_output(xtf_matching.xtf_files)}"
        output:
          - take: ErrorLog
            as: error_log
            action:
          - take: XtfLog
            as: xtf_log
            action:
              - DOWNLOAD
