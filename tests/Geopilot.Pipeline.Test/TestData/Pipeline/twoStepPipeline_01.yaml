processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: DEFAULT
      pollInterval: 500
  - id: zip_package_process
    implementation: Geopilot.Pipeline.Processes.ZipPackage.ZipPackageProcess
    default_config:
      archiveFileName: myPersonalZipArchive
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels:
pipelines:
  - id: two_steps_skip_validation
    display_name:
      en: two steps pipeline with skip condition
    delivery_restrictions:
      - expression: "Length([matcher.XtfFiles]) == 1"
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        process_config_overwrites:
          iliModels:
            - RoadsExdm2ien
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        conditions:
          pre:
            skip_conditions:
              - expression: "Length([matcher.XtfFiles]) != 1"
        input:
          iliFile: "${step_output(matcher.XtfFiles)}"
        output_actions:
          - property: XtfLog
            actions:
              - Download
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        conditions:
          pre:
            skip_conditions:
              - expression: "Length([matcher.XtfFiles]) != 1"
        input:
          input:
            - "${step_output(validation.ErrorLog)}"
            - "${step_output(validation.XtfLog)}"
            - "${step_output(matcher.XtfFiles)}"
        output_actions:
          - property: ZipPackage
            actions:
              - Download
  - id: two_steps_roadsexdm2ien
    display_name:
      en: two steps pipeline
    delivery_restrictions:
      - expression: "!([validation.ValidationSuccessful])"
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        process_config_overwrites:
          iliModels:
            - RoadsExdm2ien
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${step_output(matcher.XtfFiles)}"
        output_actions:
          - property: XtfLog
            actions:
              - Download
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        process_config_overwrites:
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.ErrorLog] == null && [validation.XtfLog] == null"
            fail_conditions:
              - expression: "[validation.ErrorLog] == null && [validation.XtfLog] == null"
          post:
            fail_conditions:
              - expression: "[zip_package.ZipPackage] == null"
        input:
          input:
            - "${step_output(validation.ErrorLog)}"
            - "${step_output(validation.XtfLog)}"
            - "${step_output(matcher.XtfFiles)}"
        output_actions:
          - property: ZipPackage
            actions:
              - Download
