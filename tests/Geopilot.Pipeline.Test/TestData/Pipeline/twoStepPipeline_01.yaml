processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: DEFAULT
      pollInterval: 500
  - id: zip_package_process
    implementation: Geopilot.Pipeline.Processes.ZipPackage.ZipPackageProcess
    default_config:
      archiveFileName: myPersonalZipArchive
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels:
pipelines:
  - id: two_steps_skip_validation
    display_name:
      en: two steps pipeline with skip condition
    delivery_restrictions:
      - expression: "Length([matcher.xtfFiles]) == 1"
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        process_config_overwrites:
          iliModels:
            - RoadsExdm2ien
        output:
          - take: xtf_files
            as: xtfFiles
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        conditions:
          pre:
            skip_conditions:
              - expression: "Length([matcher.xtfFiles]) != 1"
        input:
          iliFile: "${step_output(matcher.xtfFiles)}"
        output:
          - take: error_log
            as: errorlog
            action:
          - take: xtf_log
            as: xtflog
            action:
              - DOWNLOAD
          - take: validation_successful
            as: successful
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        conditions:
          pre:
            skip_conditions:
              - expression: "Length([matcher.xtfFiles]) != 1"
        input:
          input:
            - "${step_output(validation.errorlog)}"
            - "${step_output(validation.xtflog)}"
            - "${step_output(matcher.xtfFiles)}"
        output:
          - take: zip_package
            as: archive
            action:
              - DOWNLOAD
  - id: two_steps_roadsexdm2ien
    display_name:
      en: two steps pipeline
    delivery_restrictions:
      - expression: "!([validation.successful])"
    steps:
      - id: matcher
        display_name:
          en: XTF Matcher
        process_id: xtf_matcher
        process_config_overwrites:
          iliModels:
            - RoadsExdm2ien
        output:
          - take: xtf_files
            as: xtfFiles
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${step_output(matcher.xtfFiles)}"
        output:
          - take: error_log
            as: errorlog
            action:
          - take: xtf_log
            as: xtflog
            action:
              - DOWNLOAD
          - take: validation_successful
            as: successful
      - id: zip_package
        display_name:
          en: Zip Package
        process_id: zip_package_process
        process_config_overwrites:
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.errorlog] == null && [validation.xtflog] == null"
            fail_conditions:
              - expression: "[validation.errorlog] == null && [validation.xtflog] == null"
          post:
            fail_conditions:
              - expression: "[zip_package.archive] == null"
        input:
          input:
            - "${step_output(validation.errorlog)}"
            - "${step_output(validation.xtflog)}"
            - "${step_output(matcher.xtfFiles)}"
        output:
          - take: zip_package
            as: archive
            action:
              - DOWNLOAD
