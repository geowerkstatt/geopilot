processes:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
    steps:
      - id: validation
        display_name:
          en: XTF Validation
        process_id: xtf_validator
        input:
          iliFile: "${file(/templates/header.xtf)}"
        output:
          - take: ErrorLog
            as: error_log
            action:
