processes:
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
  - id: file_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.FileMatcher.FileMatcherProcess
    default_config:
      fileExtensions:
      fileNamePatterns:
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: DEFAULT
      pollInterval: 1000
  - id: xtf_error_visualizer
    implementation: Geopilot.Pipeline.Processes.XtfErrorVisualization.XtfErrorVisualizationProcess
    default_config:
      include:
        - map
        - tree
      groupBy:
        - Model
        - Topic
        - Class
        - Error type
      filterBy:
        - Model
        - Topic
        - Class
        - Error type
  - id: zip_packager
    implementation: Geopilot.Pipeline.Processes.ZipPackage.ZipPackageProcess
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
      de: XTF Validierung
      fr: XTF Validation
      it: XTF Validazione
    delivery_restrictions:
      - expression: "!([validation.ValidationSuccessful])"
        message:
          de: "Die Validierung war nicht erfolgreich. Datenlieferung nicht möglich."
          en: "Validation was not successful. Delivery is not possible."
          fr: "La validation n'a pas réussi. La livraison n'est pas possible."
          it: "La validazione non è riuscita. La consegna non è possibile."
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
          de: XTF Zuordnung
          fr: XTF Correspondance
          it: XTF Corrispondenza
        process_id: xtf_matcher
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: XTF Validation
          de: XTF Validierung
          fr: XTF Validation
          it: XTF Validazione
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.XtfFiles]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        input:
          iliFile: "${step_output(xtf_matching.XtfFiles)}"
        output_actions:
          - property: ErrorLog
            actions:
              - Download
              - Delivery
          - property: XtfLog
            actions:
              - Download
              - Delivery
          - property: StatusMessage
            actions:
              - StatusMessage
      - id: map_visualization
        display_name:
          en: Map Visualization
          de: Kartenvisualisierung
          it: Visualizzazione cartografica
          fr: Visualisation cartographique
        process_id: xtf_error_visualizer
        process_config_overwrites:
          include:
            - map
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.ValidationSuccessful]"
                message:
                  de: "Validierung erfolgreich. Kartenvisualisierung wird übersprungen."
                  en: "Validation successful. Map visualization will be skipped."
                  fr: "Validation réussie. La visualisation cartographique sera ignorée."
                  it: "Validazione riuscita. La visualizzazione cartografica sarà ignorata."
        input:
          xtfLog: "${step_output(validation.XtfLog)}"
        output_actions:
          - property: Visualization
            actions:
              - Visualization
          - property: StatusMessage
            actions:
              - StatusMessage
  - id: ili_validation_with_error_tree
    display_name:
      en: XTF Validation with Error Tree
      de: XTF Validierung mit Error Tree
      it: Validazione XTF con albero degli errori
      fr: Validation XTF avec arbre des erreurs
    delivery_restrictions:
      - expression: "!([validation.ValidationSuccessful])"
        message:
          de: "Die Validierung war nicht erfolgreich. Datenlieferung nicht möglich."
          en: "Validation was not successful. Delivery is not possible."
          fr: "La validation n'a pas réussi. La livraison n'est pas possible."
          it: "La validazione non è riuscita. La consegna non è possibile."
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
          de: XTF Zuordnung
          it: Corrispondenza XTF
          fr: Correspondance XTF
        process_id: xtf_matcher
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: XTF Validation
          de: XTF Validierung
          it: Validazione XTF
          fr: Validation XTF
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.XtfFiles]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        process_config_overwrites:
          validationProfile: null
        input:
          iliFile: "${step_output(xtf_matching.XtfFiles)}"
        output_actions:
          - property: ErrorLog
            actions:
              - Download
              - Delivery
          - property: XtfLog
            actions:
              - Download
              - Delivery
          - property: StatusMessage
            actions:
              - StatusMessage
      - id: error_tree
        display_name:
          en: Error Tree
          de: Error Tree
          it: Albero degli errori
          fr: Arbre des erreurs
        process_id: xtf_error_visualizer
        process_config_overwrites:
          include:
            - tree
          groupBy:
            - Class
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.ValidationSuccessful]"
                message:
                  de: "Validierung erfolgreich. Error Tree wird übersprungen."
                  en: "Validation successful. Error Tree will be skipped."
                  fr: "Validation réussie. L'arbre des erreurs sera ignoré."
                  it: "Validazione riuscita. L'albero degli errori sarà ignorato."
        input:
          xtfLog: "${step_output(validation.XtfLog)}"
        output_actions:
          - property: Visualization
            actions:
              - Visualization
          - property: StatusMessage
            actions:
              - StatusMessage
      - id: zip_packaging
        display_name:
          en: ZIP Packaging
          de: ZIP Packet
          it: Creazione ZIP
          fr: Création ZIP
        process_id: zip_packager
        input:
          input:
            - "${step_output(xtf_matching.XtfFiles)}"
            - "${step_output(validation.XtfLog)}"
            - "${step_output(validation.ErrorLog)}"
        output_actions:
          - property: ZipPackage
            actions:
              - Download
              - Delivery
          - property: StatusMessage
            actions:
              - StatusMessage
  - id: ili_validation_with_map_and_error_tree
    display_name:
      en: XTF Validation with Map and Error Tree
      de: XTF Validierung mit Karte und Error Tree
      it: Validazione XTF con mappa e albero degli errori
      fr: Validation XTF avec carte et arbre des erreurs
    delivery_restrictions:
      - expression: "!([validation.ValidationSuccessful])"
        message:
          de: "Die Validierung war nicht erfolgreich. Datenlieferung nicht möglich."
          en: "Validation was not successful. Delivery is not possible."
          fr: "La validation n'a pas réussi. La livraison n'est pas possible."
          it: "La validazione non è riuscita. La consegna non è possibile."
    steps:
      - id: xtf_matching
        display_name:
          en: Analyzing uploaded files
          de: Hochgeladene Dateien werden analysiert
          it: Analisi dei file caricati
          fr: Analyse des fichiers téléversés
        process_id: xtf_matcher
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: Validating XTF file
          de: XTF Datei wird validiert
          it: Validazione del file XTF
          fr: Validation du fichier XTF
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.XtfFiles]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        input:
          iliFile: "${step_output(xtf_matching.XtfFiles)}"
        output_actions:
          - property: ErrorLog
            actions:
              - Download
              - Delivery
          - property: XtfLog
            actions:
              - Download
              - Delivery
          - property: StatusMessage
            actions:
              - StatusMessage
      - id: error_visualization
        display_name:
          en: Error Visualization
          de: Fehlervisualisierung
          it: Visualizzazione degli errori
          fr: Visualisation des erreurs
        process_id: xtf_error_visualizer
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.ValidationSuccessful]"
                message:
                  de: "Validierung erfolgreich. Fehlervisualisierung wird übersprungen."
                  en: "Validation successful. Error visualization will be skipped."
                  fr: "Validation réussie. La visualisation des erreurs sera ignorée."
                  it: "Validazione riuscita. La visualizzazione degli errori sarà ignorata."
        input:
          xtfLog: "${step_output(validation.XtfLog)}"
        output_actions:
          - property: Visualization
            actions:
              - Visualization
          - property: StatusMessage
            actions:
              - StatusMessage
