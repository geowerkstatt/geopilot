processes:
  - id: xtf_matcher
    implementation: Geopilot.Api.Pipeline.Process.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
  - id: xtf_validator
    implementation: Geopilot.Api.Pipeline.Process.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: ""
      pollInterval: 1000
  - id: map_visualizer
    implementation: Geopilot.Api.Pipeline.Process.MapVisualization.MapVisualizationProcess
  - id: file_matcher
    implementation: Geopilot.Api.Pipeline.Process.Matcher.FileMatcher.FileMatcherProcess
    default_config:
      fileExtensions:
      fileNamePatterns:
  - id: unzipper
    implementation: Geopilot.Api.Pipeline.Process.Unzip.UnzipProcess
  - id: xtf_diff
    implementation: Geopilot.Api.Pipeline.Process.XtfDiff.XtfDiffProcess
    default_config:
      pollInterval: 1000
      modelDirectory: null
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
      de: XTF Validierung
      it: Validazione XTF
      fr: Validation XTF
    delivery_restrictions:
      - expression: "!([validation.successful])"
        message:
          de: "Die Validierung war nicht erfolgreich. Datenlieferung nicht möglich."
          en: "Validation was not successful. Delivery is not possible."
          fr: "La validation n'a pas réussi. La livraison n'est pas possible."
          it: "La validazione non è riuscita. La consegna non è possibile."
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
          de: XTF Zuordnung
          it: Corrispondenza XTF
          fr: Correspondance XTF
        process_id: xtf_matcher
        output:
          - take: xtf_files
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
          de: XTF Validierung
          it: Validazione XTF
          fr: Validation XTF
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.xtf_files]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        process_config_overwrites:
        input:
          - from: xtf_matching
            take: xtf_files
            as: iliFile
        output:
          - take: error_log
            as: error_log
            action:
              - Download
              - Delivery
          - take: xtf_log
            as: xtf_log
            action:
              - Download
              - Delivery
          - take: status_message
            as: status_message
            action:
              - StatusMessage
          - take: validation_successful
            as: successful
      - id: map_visualization
        display_name:
          en: Map Visualization
          de: Kartenvisualisierung
          it: Visualizzazione cartografica
          fr: Visualisation cartographique
        process_id: map_visualizer
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.successful]"
                message:
                  de: "Validierung erfolgreich. Kartenvisualisierung wird übersprungen."
                  en: "Validation successful. Map visualization will be skipped."
                  fr: "Validation réussie. La visualisation cartographique sera ignorée."
                  it: "Validazione riuscita. La visualizzazione cartografica sarà ignorata."
        input:
          - from: validation
            take: xtf_log
            as: errorLogXtf
        output:
          - take: map_visualization_config_file
            as: map_visualization
            action:
              - MapVisualization
          - take: status_message
            as: status_message
            action:
              - StatusMessage
  - id: xtf_comparison
    display_name:
      en: XTF Comparison
      de: XTF Vergleich
      fr: Comparaison XTF
      it: Confronto XTF
    steps:
      - id: zip_matching
        display_name:
          en: ZIP Matching
          de: ZIP Zuordnung
          fr: Correspondance ZIP
          it: Corrispondenza ZIP
        process_id: file_matcher
        process_config_overwrites:
          fileExtensions:
            - zip
        output:
          - take: matched_files
            as: zip_files
          - take: status_message
            as: status_message
            action:
              - StatusMessage
      - id: unzip
        display_name:
          en: Unzip
          de: Entpacken
          fr: Décompression
          it: Estrazione
        process_id: unzipper
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([zip_matching.zip_files]) != 1"
                message:
                  de: "Es muss genau eine ZIP-Datei hochgeladen werden."
                  en: "Exactly one ZIP file must be uploaded."
                  fr: "Exactement un fichier ZIP doit être téléchargé."
                  it: "Deve essere caricato esattamente un file ZIP."
        input:
          - from: zip_matching
            take: zip_files
            as: zipFile
        output:
          - take: extracted_files
            as: extracted_files
          - take: status_message
            as: status_message
            action:
              - StatusMessage
      - id: comparison
        display_name:
          en: XTF Comparison
          de: XTF Vergleich
          fr: Comparaison XTF
          it: Confronto XTF
        process_id: xtf_diff
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([unzip.extracted_files]) != 2"
                message:
                  de: "Das ZIP-Archiv muss genau zwei XTF-Dateien enthalten."
                  en: "The ZIP archive must contain exactly two XTF files."
                  fr: "L'archive ZIP doit contenir exactement deux fichiers XTF."
                  it: "L'archivio ZIP deve contenere esattamente due file XTF."
        input:
          - from: unzip
            take: extracted_files
            as: xtfFiles
        output:
          - take: diff_file
            as: diff_file
            action:
              - Download
          - take: map_visualization_config_file
            as: map_visualization
            action:
              - MapVisualization
          - take: status_message
            as: status_message
            action:
              - StatusMessage
