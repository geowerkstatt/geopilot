processes:
  - id: xtf_matcher
    implementation: Geopilot.Api.Pipeline.Process.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
  - id: xtf_validator
    implementation: Geopilot.Api.Pipeline.Process.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: ""
      pollInterval: 1000
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
      de: XTF Validierung
      it: Validazione XTF
      fr: Validation XTF
    delivery_condition: "[validation.successful]"
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
          de: XTF Zuordnung
          it: Corrispondenza XTF
          fr: Correspondance XTF
        process_id: xtf_matcher
        output:
          - take: xtf_files
            as: xtf_files
      - id: validation
        display_name:
          en: XTF Validation
          de: XTF Validierung
          it: Validazione XTF
          fr: Validation XTF
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.xtf_files]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        process_config_overwrites:
        input:
          - from: xtf_matching
            take: xtf_files
            as: iliFile
        output:
          - take: error_log
            as: error_log
            action:
              - Download
              - Delivery
          - take: xtf_log
            as: xtf_log
            action:
              - Download
              - Delivery
          - take: status_message
            as: status_message
            action:
              - StatusMessage
          - take: validation_successful
            as: successful
