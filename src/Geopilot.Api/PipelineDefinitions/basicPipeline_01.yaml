processes:
  - id: xtf_matcher
    implementation: Geopilot.Pipeline.Processes.Matcher.XtfMatcher.XtfMatcherProcess
    default_config:
      fileExtensions:
        - xtf
      iliModels: null
      fileNamePatterns: null
  - id: xtf_validator
    implementation: Geopilot.Pipeline.Processes.XtfValidation.XtfValidatorProcess
    default_config:
      validationProfile: ""
      pollInterval: 1000
  - id: xtf_error_visualizer
    implementation: Geopilot.Pipeline.Processes.XtfErrorVisualization.XtfErrorVisualizationProcess
    default_config:
      include:
        - map
        - tree
      groupBy:
        - Model
        - Topic
        - Class
        - Error type
      filterBy:
        - Model
        - Topic
        - Class
        - Error type
pipelines:
  - id: ili_validation
    display_name:
      en: XTF Validation
      de: XTF Validierung
      it: Validazione XTF
      fr: Validation XTF
    delivery_restrictions:
      - expression: "!([validation.ValidationSuccessful])"
        message:
          de: "Die Validierung war nicht erfolgreich. Datenlieferung nicht möglich."
          en: "Validation was not successful. Delivery is not possible."
          fr: "La validation n'a pas réussi. La livraison n'est pas possible."
          it: "La validazione non è riuscita. La consegna non è possibile."
    steps:
      - id: xtf_matching
        display_name:
          en: XTF Matching
          de: XTF Zuordnung
          it: Corrispondenza XTF
          fr: Correspondance XTF
        process_id: xtf_matcher
        input:
          files: "${upload()}"
      - id: validation
        display_name:
          en: XTF Validation
          de: XTF Validierung
          it: Validazione XTF
          fr: Validation XTF
        process_id: xtf_validator
        conditions:
          pre:
            fail_conditions:
              - expression: "Length([xtf_matching.XtfFiles]) != 1"
                message:
                  de: "Es muss genau eine XTF-Datei hochgeladen werden."
                  en: "Exactly one XTF file must be uploaded."
                  fr: "Exactement un fichier XTF doit être téléchargé."
                  it: "Deve essere caricato esattamente un file XTF."
        process_config_overwrites:
        input:
          iliFile: "${step_output(xtf_matching.XtfFiles)}"
        output_actions:
          - property: ErrorLog
            actions:
              - Download
              - Delivery
          - property: XtfLog
            actions:
              - Download
              - Delivery
          - property: StatusMessage
            actions:
              - StatusMessage
      - id: map_visualization
        display_name:
          en: Map Visualization
          de: Kartenvisualisierung
          it: Visualizzazione cartografica
          fr: Visualisation cartographique
        process_id: xtf_error_visualizer
        process_config_overwrites:
          include:
            - map
        conditions:
          pre:
            skip_conditions:
              - expression: "[validation.ValidationSuccessful]"
                message:
                  de: "Validierung erfolgreich. Kartenvisualisierung wird übersprungen."
                  en: "Validation successful. Map visualization will be skipped."
                  fr: "Validation réussie. La visualisation cartographique sera ignorée."
                  it: "Validazione riuscita. La visualizzazione cartografica sarà ignorata."
        input:
          xtfLog: "${step_output(validation.XtfLog)}"
        output_actions:
          - property: Visualization
            actions:
              - Visualization
          - property: StatusMessage
            actions:
              - StatusMessage
