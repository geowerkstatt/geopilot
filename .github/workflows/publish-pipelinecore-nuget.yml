name: Publish Geopilot.PipelineCore NuGet package

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out before packing the NuGet package."
        required: true
        type: string
      version-suffix:
        description: "Suffix appended to the version read from the csproj (e.g. -preview.123)."
        required: false
        type: string
        default: ""
      create-tag:
        description: "Whether to create a pipelinecore/v{version} git tag pointing at the checked out ref."
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish Geopilot.PipelineCore NuGet package

    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Read PipelineCore version from csproj
        run: |
          BASE_VERSION=$(grep -oP "(?<=<VersionPrefix>)[^<]+" src/Geopilot.PipelineCore/Geopilot.PipelineCore.csproj)
          echo CORE_VERSION=${BASE_VERSION}${{ inputs.version-suffix }} >> $GITHUB_ENV

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Pack NuGet package
        run: dotnet pack src/Geopilot.PipelineCore/Geopilot.PipelineCore.csproj -c Release -p:Version=${{ env.CORE_VERSION }} -o nuget-artifacts

      - name: Push NuGet package to GitHub Packages
        run: dotnet nuget push "nuget-artifacts/*.nupkg" --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Tag PipelineCore version
        if: ${{ inputs.create-tag }}
        run: |
          git fetch --tags
          CORE_TAG="pipelinecore/v${CORE_VERSION}"
          if git rev-parse --verify "refs/tags/${CORE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${CORE_TAG} already exists, skipping."
          else
            git tag "${CORE_TAG}" "${{ inputs.ref }}"
            git push origin "${CORE_TAG}"
            echo "Created tag ${CORE_TAG} at ${{ inputs.ref }}."
          fi
