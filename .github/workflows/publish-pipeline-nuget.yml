name: Publish Geopilot.Pipeline NuGet package

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out before packing the NuGet package."
        required: true
        type: string
      version-suffix:
        description: "Suffix appended to the version read from the csproj (e.g. -preview.123)."
        required: false
        type: string
        default: ""
      create-tag:
        description: "Whether to create a pipeline/v{version} git tag pointing at the checked out ref."
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish Geopilot.Pipeline NuGet package

    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Read Geopilot.Pipeline version from csproj
        run: |
          BASE_VERSION=$(grep -oP "(?<=<Version>)[^<]+" src/Geopilot.Pipeline/Geopilot.Pipeline.csproj)
          echo PIPELINE_VERSION=${BASE_VERSION}${{ inputs.version-suffix }} >> $GITHUB_ENV

      - name: Setup dotnet
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0"

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github-geowerkstatt --username "$USERNAME" --password "%GITHUB_TOKEN%" --store-password-in-clear-text
        env:
          USERNAME: ${{ github.actor }}

      - name: Install dependencies
        run: dotnet restore Geopilot.slnx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack NuGet package
        run: dotnet pack src/Geopilot.Pipeline/Geopilot.Pipeline.csproj --no-restore -c Release -p:Version=${{ env.PIPELINE_VERSION }} -o nuget-artifacts

      - name: Push NuGet package to GitHub Packages
        run: dotnet nuget push "nuget-artifacts/*.nupkg" --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Tag Geopilot.Pipeline version
        if: ${{ inputs.create-tag }}
        run: |
          git fetch --tags
          PIPELINE_TAG="pipeline/v${PIPELINE_VERSION}"
          if git rev-parse --verify "refs/tags/${PIPELINE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${PIPELINE_TAG} already exists, skipping."
          else
            git tag "${PIPELINE_TAG}" "${{ inputs.ref }}"
            git push origin "${PIPELINE_TAG}"
            echo "Created tag ${PIPELINE_TAG} at ${{ inputs.ref }}."
          fi
