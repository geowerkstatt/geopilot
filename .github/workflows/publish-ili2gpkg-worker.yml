name: Publish ili2gpkg-worker image

on:
  push:
    branches: [main]
    paths:
      - 'docker/ili2gpkg-worker/**'
      - '.github/workflows/publish-ili2gpkg-worker.yml'
  workflow_dispatch:
    inputs:
      ili2gpkg_version:
        description: 'ili2gpkg version to bundle (overrides the ARG default in the Dockerfile). The worker version itself is derived automatically from docker/ili2gpkg-worker/VERSION.'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geowerkstatt/ili2gpkg-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and push ili2gpkg-worker image to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine versions
        id: version
        run: |
          ILI2GPKG_VERSION="${{ github.event.inputs.ili2gpkg_version }}"
          if [ -z "$ILI2GPKG_VERSION" ]; then
            ILI2GPKG_VERSION=$(grep -oP '(?<=ARG ILI2GPKG_VERSION=)[0-9.]+' docker/ili2gpkg-worker/Dockerfile | head -1)
          fi
          if [ -z "$ILI2GPKG_VERSION" ]; then
            echo "Could not determine ili2gpkg version from docker/ili2gpkg-worker/Dockerfile" >&2
            exit 1
          fi
          WORKER_BASE=$(tr -d '[:space:]' < docker/ili2gpkg-worker/VERSION)
          if [ -z "$WORKER_BASE" ]; then
            echo "Could not read worker base version from docker/ili2gpkg-worker/VERSION" >&2
            exit 1
          fi
          echo "ili2gpkg=$ILI2GPKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "worker=${WORKER_BASE}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "worker_major=${WORKER_BASE%%.*}" >> "$GITHUB_OUTPUT"
          echo "Building ili2gpkg-worker v${WORKER_BASE}.${GITHUB_RUN_NUMBER} bundling ili2gpkg ${ILI2GPKG_VERSION} (commit $(git rev-parse --short HEAD))"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ili2gpkg-worker image
        uses: docker/build-push-action@v7
        with:
          context: docker/ili2gpkg-worker
          push: true
          # Disable provenance/SBOM attestations: they push extra untagged manifests that
          # would otherwise pile up as orphaned GHCR versions and complicate retention.
          provenance: false
          sbom: false
          build-args: |
            ILI2GPKG_VERSION=${{ steps.version.outputs.ili2gpkg }}
          # Tagging strategy (the worker version is independent of the bundled ili2gpkg version):
          #   :latest               most recent main build (mutable).
          #   :v<major>             rolling major tag, the recommended production pin. Always
          #                         resolves to the newest build of that major and survives
          #                         the aggressive retention below.
          #   :v<major.minor.run>   granular per-build tag. Immutable but short-lived: the
          #                         retention step prunes it shortly after the next build.
          # The bundled ili2gpkg version is exposed via the ch.geowerkstatt.ili2gpkg.version label.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.worker }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.worker_major }}
          labels: |
            org.opencontainers.image.title=ili2gpkg-worker
            org.opencontainers.image.description=Long-running worker that runs ili2gpkg over per-job folders dropped into a shared directory.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.worker }}
            ch.geowerkstatt.ili2gpkg.version=${{ steps.version.outputs.ili2gpkg }}
            org.opencontainers.image.licenses=LGPL-2.1-only

      - name: Prune old ili2gpkg-worker image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ili2gpkg-worker
          package-type: container
          # Keep the newest few digests (current build plus a small rollback buffer). The
          # :latest and :v<major> tags always ride the newest digest, so they are never
          # pruned; older granular tags and untagged manifests are removed.
          min-versions-to-keep: 3
