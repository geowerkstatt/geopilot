name: Publish ili2gpkg image

on:
  push:
    branches: [main]
    paths:
      - 'docker/ili2gpkg/**'
      - '.github/workflows/publish-ili2gpkg.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'ili2gpkg version to build (overrides the Dockerfile ARG default)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geowerkstatt/ili2gpkg

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine ili2gpkg version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=ARG ILI2GPKG_VERSION=)[0-9.]+' docker/ili2gpkg/Dockerfile | head -1)
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not determine ili2gpkg version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ili2gpkg ${VERSION}"

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ili2gpkg image
        uses: docker/build-push-action@v7
        with:
          context: docker/ili2gpkg
          push: true
          build-args: |
            ILI2GPKG_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
